<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0f1a" />
    <meta
      name="description"
      content="Portfolio and blog of Paweł Wielga - .NET Developer & Software Engineer."
    />
    <meta name="robots" content="index,follow" />
    <title>Paweł Wielga | .NET Developer & Software Engineer</title>

    <!-- Canonical and OG URLs are overridden per-route via react-helmet-async -->
    <!-- Default fallback values are set in src/config/site.js -->

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Open Graph defaults are overridden per-route via react-helmet-async -->
    <meta property="og:site_name" content="Paweł Wielga" />
    <meta property="og:type" content="website" />
    <!-- og:url, og:title, og:description set via Helmet per route -->
    <!-- og:image set via Helmet per route -->

    <!-- Twitter card meta set via Helmet per route -->

    <link rel="manifest" href="/manifest.webmanifest" />
    <script src="/redirect-handler.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Use a relative path so GitHub Pages serves the module correctly -->
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
